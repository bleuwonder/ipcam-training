services:
  label-studio:
    image: heartexlabs/label-studio:latest
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
      - label-studio-data:/label-studio/data
    environment:
      - LABEL_STUDIO_LOCAL_FILES_SERVING_ENABLED=true
      - LABEL_STUDIO_LOCAL_FILES_DOCUMENT_ROOT=/data
    restart: unless-stopped

  pipeline:
    build: .
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      - ./models:/app/models
      - ${FRIGATE_CONFIG_DIR:-/dev/null}:/frigate-config
    environment:
      - FRIGATE_URL=${FRIGATE_URL:-http://host.docker.internal:5000}
      - GOOGLE_APPLICATION_CREDENTIALS=/app/config/gcp-credentials.json
      - LABEL_STUDIO_URL=http://label-studio:8080
      - LABEL_STUDIO_API_KEY=${LABEL_STUDIO_API_KEY}
      - DATABASE_URL=sqlite:///app/data/pipeline.db
    depends_on:
      - label-studio
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    command: ["python", "cli.py", "collect", "start"]

volumes:
  label-studio-data:
