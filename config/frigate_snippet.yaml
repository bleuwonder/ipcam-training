# ============================================================
# Frigate Config Changes Required
# ============================================================
# Add these to your Frigate config.yml

# 1. Enable clean snapshots for all cameras (or per-camera)
snapshots:
  enabled: true
  clean_copy: true       # REQUIRED: saves unannotated copy for training
  crop: false            # Keep full frame for training
  quality: 95
  timestamp: false
  bounding_box: true
  retain:
    default: 30          # Keep snapshots 30 days

# 2. Track all relevant objects
objects:
  track:
    - person
    - car
    - motorcycle
    - bicycle
    - truck
    - bus
    - cat
    - dog
    - bird
  filters:
    person:
      min_score: 0.5
    car:
      min_score: 0.5

